<style>
body {
  margin: 0;
  font-family: Poppins, sans-serif;
  background:
    linear-gradient(rgba(0,0,0,.75), rgba(0,0,0,.85)),
    url('c.jpg') center / cover no-repeat fixed;
  color: #fff;
}
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 60px;
  background: rgba(0,0,0,.85);
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 999;
}

nav a {
  color: #fff;
  margin-left: 25px;
  text-decoration: none;
  font-weight: 600;
  position: relative;
}

nav a::after {
  content: "";
  position: absolute;
  width: 0;
  height: 3px;
  left: 0;
  bottom: -6px;
  background: #00e5ff;
  transition: .3s;
}

nav a:hover::after { width: 100%; }

section{
  padding:90px 60px;
  display:grid;
  grid-template-columns:1fr;
  gap:40px;
}

h2{
  color:#00e5ff;
  font-size:38px;
  margin-bottom:20px;
  text-align:center;
}

.card{
  background:linear-gradient(145deg,#111,#1c1c1c);
  padding:35px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.08);
  transition:.4s;
  display:grid;
  gap:20px; /* vertical spacing between media items */
}

.card:hover{
  transform:translateY(-4px) scale(1.01);
  box-shadow:0 20px 50px rgba(0,229,255,.25);
  border-color:#00e5ff;
}

.card h3{
  color:#00e5ff;
  margin-bottom:10px;
}

/* Poster class for images and video posters */
.poster {
  width: 100%;
  border-radius: 12px;
  object-fit: cover;
  border: 1px solid rgba(0,229,255,.3);
  transition: transform 0.3s, box-shadow 0.3s;
  cursor: pointer;
}

.poster:hover {
  transform: scale(1.02);
  box-shadow: 0 10px 30px rgba(0,229,255,.4);
}
</style>
</head>
